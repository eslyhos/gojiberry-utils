<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gojiberry Sender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-body">
      <h4 class="card-title mb-4">Gojiberry Sender</h4>

      <div class="mb-3">
        <label class="form-label">Ntfy Topic</label>
        <input type="text" id="topic" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Encryption Key</label>
        <input type="text" id="encKey" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Command</label>
        <input type="text" id="command" class="form-control">
      </div>

      <div class="d-flex gap-2">
        <button id="saveBtn" class="btn btn-secondary">Save</button>
        <button id="sendBtn" class="btn btn-primary">Send</button>
      </div>

      <div id="message" class="mt-3"></div>
    </div>
  </div>
</div>

<script type="module">
import { chacha20poly1305 } from "https://esm.sh/@noble/ciphers@0.5.3/chacha";

const topicInput = document.getElementById("topic");
const keyInput = document.getElementById("encKey");
const commandInput = document.getElementById("command");
const messageDiv = document.getElementById("message");

// UTF-8 helpers
const enc = new TextEncoder();
const dec = new TextDecoder();

// Show message
function showMessage(text, type="success") {
  messageDiv.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
  setTimeout(() => messageDiv.innerHTML = "", 5000);
}

// Load from localStorage
window.addEventListener("DOMContentLoaded", () => {
  const savedTopic = localStorage.getItem("ntfy_topic_pref");
  const savedKey = localStorage.getItem("ntfy_enc_key_pref");

  if (savedTopic !== null) topicInput.value = savedTopic;
  if (savedKey !== null) keyInput.value = savedKey;
});

// Save button
document.getElementById("saveBtn").addEventListener("click", () => {
  localStorage.setItem("ntfy_topic_pref", topicInput.value);
  localStorage.setItem("ntfy_enc_key_pref", keyInput.value);
  showMessage("Saved successfully");
});

// SHA-256 hash
async function sha256(dataBytes) {
  const hash = await crypto.subtle.digest("SHA-256", dataBytes);
  return new Uint8Array(hash);
}

// Random nonce (12 bytes)
function randomNonce() {
  const nonce = new Uint8Array(12);
  crypto.getRandomValues(nonce);
  return nonce;
}

// Base64 encode Uint8Array
function toBase64(bytes) {
  let binary = "";
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

// Send button
document.getElementById("sendBtn").addEventListener("click", async () => {
  try {
    const topic = topicInput.value;
    const keyText = keyInput.value;
    const command = commandInput.value;

    if (!topic || !keyText) {
      showMessage("Topic and Encryption Key are required", "danger");
      return;
    }

    // Split at first comma
    let firstPart = command;
    let secondPart = "";

    const idx = command.indexOf(",");
    if (idx !== -1) {
      firstPart = command.slice(0, idx).trim();
      secondPart = command.slice(idx + 1).trim();
    }

    if (!secondPart) {
      showMessage("Command must contain a comma and second part", "danger");
      return;
    }

    // Hash key (UTF-8)
    const keyBytes = enc.encode(keyText);
    const hashedKey = await sha256(keyBytes);

    // Nonce
    const nonce = randomNonce();

    // Encrypt
    const cipher = chacha20poly1305(hashedKey, nonce);
    const plaintextBytes = enc.encode(secondPart);
    const ciphertext = cipher.encrypt(plaintextBytes);

    // Prepend nonce
    const combined = new Uint8Array(nonce.length + ciphertext.length);
    combined.set(nonce, 0);
    combined.set(ciphertext, nonce.length);

    // Base64 encode
    const encoded = toBase64(combined);

    // Final payload
    const payload = `${firstPart}, ${encoded}`;

    showMessage("Sending message ...", "info");

    // Send to ntfy
    const response = await fetch(`https://ntfy.sh/${encodeURIComponent(topic)}`, {
      method: "POST",
      body: payload
    });

    if (!response.ok) {
      throw new Error("Failed to send message");
    }

    commandInput.value = "";
    showMessage("Message sent successfully");
  } catch (err) {
    showMessage(err.message || "Error occurred", "danger");
  }
});
</script>

</body>
</html>
