<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojiberry Ntfy Command Sender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/js-ascon@1.3.0/dist/ascon.min.js"></script>
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <h3 class="mb-4">Gojiberry Ntfy Command Sender</h3>
    
    <div class="mb-3">
        <label class="form-label fw-bold">Ntfy Topic</label>
        <input type="text" id="ntfyTopic" class="form-control" placeholder="topic-name">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Encryption Key</label>
        <input type="password" id="encKey" class="form-control" placeholder="Your secret key">
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">Command</label>
        <input type="text" id="command" class="form-control">
    </div>

    <div class="d-flex gap-2">
        <button id="saveBtn" class="btn btn-outline-primary">Save Settings</button>
        <button id="sendBtn" class="btn btn-primary px-4">Send</button>
    </div>

    <div id="statusAlert" class="alert d-none mt-4" role="alert"></div>
</div>

<script>
    const topicInput = document.getElementById('ntfyTopic');
    const keyInput = document.getElementById('encKey');
    const cmdInput = document.getElementById('command');
    const statusAlert = document.getElementById('statusAlert');

    // Load from Local Storage
    window.onload = () => {
        topicInput.value = localStorage.getItem('ntfy_topic_pref') || '';
        keyInput.value = localStorage.getItem('ntfy_enc_key_pref') || '';
    };

    // Save to Local Storage
    document.getElementById('saveBtn').onclick = () => {
        localStorage.setItem('ntfy_topic_pref', topicInput.value);
        localStorage.setItem('ntfy_enc_key_pref', keyInput.value);
        showFeedback('Preferences saved!', 'success');
    };

    document.getElementById('sendBtn').onclick = async () => {
        // Correcting the library reference to JsAscon
        if (typeof JsAscon === 'undefined') {
            showFeedback('Error: JsAscon library not found.', 'danger');
            return;
        }

        const topic = topicInput.value.trim();
        const rawKey = keyInput.value;
        const commandText = cmdInput.value;

        if (!topic || !rawKey) {
            showFeedback('Please provide both Topic and Encryption Key.', 'warning');
            return;
        }

        try {
            // Split by first comma
            let part1 = commandText;
            let part2 = "";
            const commaIndex = commandText.indexOf(',');
            
            if (commaIndex !== -1) {
                part1 = commandText.substring(0, commaIndex).trim();
                part2 = commandText.substring(commaIndex + 1).trim();
            }

            // 1. Hash the key with SHA-256 and take first 16 bytes (128-bit)
            const keyBytes = new TextEncoder().encode(rawKey);
            const hashBuffer = await crypto.subtle.digest('SHA-256', keyBytes);
            const asconKey = new Uint8Array(hashBuffer).slice(0, 16);
            
            // 2. Generate random 16-byte Nonce
            const nonce = crypto.getRandomValues(new Uint8Array(16));
            
            // 3. Encrypt Part 2
            const dataBytes = new TextEncoder().encode(part2);
            // JsAscon.encrypt(key, nonce, data, associatedData)
            const encrypted = JsAscon.encrypt(asconKey, nonce, new Uint8Array(0), dataBytes);

            // 4. Combine: Nonce (16) + Encrypted Data (includes Tag)
            const combined = new Uint8Array(nonce.length + encrypted.length);
            combined.set(nonce);
            combined.set(encrypted, nonce.length);

            // 5. Convert to Base64
            const base64Payload = btoa(String.fromCharCode(...combined));
            const finalString = `${part1}, ${base64Payload}`;

            // 6. POST to ntfy
            const response = await fetch(`https://ntfy.sh/${topic}`, {
                method: 'POST',
                body: finalString
            });

            if (response.ok) {
                showFeedback('Message sent successfully!', 'success');
                cmdInput.value = '';
            } else {
                throw new Error('Failed to send: ' + response.statusText);
            }

        } catch (err) {
            showFeedback('Error: ' + err.message, 'danger');
        }
    };

    function showFeedback(msg, type) {
        statusAlert.textContent = msg;
        statusAlert.className = `alert alert-${type} mt-4`;
        statusAlert.classList.remove('d-none');
        setTimeout(() => statusAlert.classList.add('d-none'), 5000);
    }
</script>

</body>
</html>
